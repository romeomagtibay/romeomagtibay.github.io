<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Romeo Magtibay Jr. - Sr. Full Stack Developer. Building scalable, maintainable web applications with Java, Spring, Angular, and React."
    />
    <meta name="theme-color" content="#0b0d12" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <title>Romeo Magtibay Jr. - Sr. Full Stack Developer</title>
    <script>
      // Set theme before paint to prevent flash of incorrect theme.
      // First-time visitors default to dark;
      (function () {
        try {
          var theme = localStorage.getItem("theme") || "dark";
          if (theme === "dark") document.documentElement.classList.add("dark");
        } catch (e) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
