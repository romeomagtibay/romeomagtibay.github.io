name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Only one concurrent deployment at a time, but don't cancel in-progress runs
# so they can finish publishing.
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        # Using `npm install` instead of `npm ci` so the Linux runner can
        # resolve platform-specific optional deps (e.g. @tailwindcss/oxide
        # native binaries) that the Windows-generated lockfile doesn't list.
        run: npm install --no-audit --no-fund

      - name: Build
        # Deployed as a GitHub user site at https://romeomagtibay.github.io/,
        # so the site is served from the root and the default base is '/'.
        # Same root-served setup works for a future custom domain (e.g.
        # rmagtibay.dev) without any code or workflow changes.
        # VITE_BASE_PATH stays here as an escape hatch in case the site
        # ever needs to be deployed under a sub-path again.
        run: npm run build
        env:
          VITE_BASE_PATH: ${{ vars.VITE_BASE_PATH || '/' }}

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
