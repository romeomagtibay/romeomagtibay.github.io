name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Only one concurrent deployment at a time, but don't cancel in-progress runs
# so they can finish publishing.
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        # Reads the VITE_BASE_PATH repo variable when set, falling back to
        # /rmagtibay/ for the default GitHub Pages sub-path deployment.
        # When you attach a custom domain (e.g. rmagtibay.dev), create a
        # repo variable VITE_BASE_PATH=/ under
        # Settings -> Secrets and variables -> Actions -> Variables.
        run: npm run build
        env:
          VITE_BASE_PATH: ${{ vars.VITE_BASE_PATH || '/rmagtibay/' }}

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
